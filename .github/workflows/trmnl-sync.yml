name: Sync to TRMNL

on:
  # Run every 5 minutes (unlimited for public repos)
  schedule:
    - cron: '*/5 * * * *'
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
      
      - name: Install dependencies
        # Pin the major version. An unpinned install silently jumped to v14, whose
        # ESM export shape change broke the sync script. Bump deliberately after testing.
        run: npm install firebase-admin@^14

      - name: Sync to TRMNL
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          TRMNL_WEBHOOK_URL: ${{ secrets.TRMNL_WEBHOOK_URL }}
        run: node scripts/trmnl-sync.mjs