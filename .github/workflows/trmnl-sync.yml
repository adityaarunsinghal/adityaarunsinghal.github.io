name: Sync to TRMNL

on:
  # Run every 5 minutes (unlimited for public repos)
  schedule:
    - cron: '*/5 * * * *'
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install dependencies
        run: |
          mkdir -p /tmp/trmnl-deps
          cd /tmp/trmnl-deps
          npm init -y > /dev/null
          npm install firebase-admin
          echo "NODE_PATH=/tmp/trmnl-deps/node_modules" >> $GITHUB_ENV

      - name: Sync to TRMNL
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          TRMNL_WEBHOOK_URL: ${{ secrets.TRMNL_WEBHOOK_URL }}
        run: node scripts/trmnl-sync.mjs