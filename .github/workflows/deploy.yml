name: Deploy to GitHub Pages

# Uncomment the lines below to enable auto-deployment on push
# on:
#   push:
#     branches: [ master ]
#   pull_request:
#     branches: [ master ]

on:
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: latest

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '22'
        cache: 'pnpm'

    - name: Configure Git
      run: |
        git config --global user.email "adityaarunsinghal@gmail.com"
        git config --global user.name "Aditya Singhal"

    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      
    - name: Install Functions dependencies
      run: cd functions && npm ci
      
    - name: Build Functions
      run: cd functions && npm run build
      
    - name: Build
      # Root deps are installed via pnpm above; npm run build would run without
      # node_modules. Use pnpm to match the install step.
      run: pnpm run build
      env:
        VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
        VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
        VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
        VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
        VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
    
    - name: Deploy Firebase Functions
      continue-on-error: true
      env:
        TRANSLATE_API_KEY: ${{ secrets.TRANSLATE_API_KEY }}
        FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
      run: pnpm dlx firebase-tools deploy --only functions --project aditya-singhal-website --token "$FIREBASE_TOKEN"

    - name: Deploy Firestore Rules
      continue-on-error: true
      env:
        FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
      run: pnpm dlx firebase-tools deploy --only firestore:rules --project aditya-singhal-website --token "$FIREBASE_TOKEN"
        
    - name: Deploy GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./dist
