<div class="view view--half_vertical">

  <div style="display: flex; flex-direction: column; justify-content: space-between; height: calc(100% - 36px); padding: 16px 16px 12px 16px;">

    <!-- Love Message (Top) -->
    <div style="flex: 1; display: flex; align-items: center; justify-content: center;">
      <div style="text-align: center; max-width: 100%;">
        <div style="font-size: 8px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.5; margin-bottom: 8px;">
          A message for you
        </div>
        <div style="font-size: 18px; line-height: 1.35; font-weight: 500; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical;">
          "{{ love_message }}"
        </div>
      </div>
    </div>

    <!-- Divider -->
    <div style="border-top: 2px solid black; margin: 12px 0; opacity: 0.3;"></div>

    <!-- Bottom Section -->
    <div style="display: flex; flex-direction: column; gap: 12px;">

      <!-- Countdowns (Row) -->
      <div style="display: flex; justify-content: center; gap: 16px;">
        {% for event in countdowns limit:2 %}
        <div style="text-align: center;">
          <div style="font-size: 24px; font-weight: 700; line-height: 1;">{{ event.days }}</div>
          <div style="font-size: 8px; opacity: 0.6;">days till</div>
          <div style="font-size: 10px; font-weight: 600;">{{ event.name }}</div>
        </div>
        {% endfor %}
        {% if countdowns.size == 0 %}
        <div style="opacity: 0.4; font-size: 10px;">No countdowns</div>
        {% endif %}
      </div>

      <!-- QR + Stats (Centered) -->
      <div style="display: flex; justify-content: center; align-items: center; gap: 10px;">
        <div style="text-align: right; font-size: 9px; opacity: 0.5; line-height: 1.3;">
          <div>{{ message_count }} letters</div>
          <div>of love</div>
        </div>
        <div style="display: flex; flex-direction: column; align-items: center;">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=48x48&data=HTTPS://ADITYASINGHAL.COM/LOVESINGY&margin=0" 
            style="width: 36px; height: 36px; image-rendering: pixelated;" />
          <div style="font-size: 7px; opacity: 0.4; margin-top: 1px;">reply</div>
        </div>
      </div>

    </div>

  </div>

  <!-- Title Bar -->
  <div class="title_bar">
    <img src="https://img.icons8.com/ios-glyphs/14/000000/like--v1.png" style="opacity: 0.7; margin-right: 4px;" />
    <span class="title">Love from Adi</span>
  </div>

</div>
