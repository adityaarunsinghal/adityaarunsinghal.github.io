<div class="view view--quadrant">

  <div style="display: flex; flex-direction: column; justify-content: space-between; height: calc(100% - 24px); padding: 10px 12px 8px 12px;">

    <!-- Love Message -->
    <div style="flex: 1; display: flex; align-items: center; justify-content: center;">
      <div style="text-align: center; max-width: 100%;">
        <div style="font-size: 7px; letter-spacing: 1.5px; text-transform: uppercase; opacity: 0.5; margin-bottom: 4px;">
          A message for you
        </div>
        <div style="font-size: 14px; line-height: 1.3; font-weight: 500; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;">
          "{{ love_message }}"
        </div>
      </div>
    </div>

    <!-- Divider -->
    <div style="border-top: 1px solid black; margin: 8px 0; opacity: 0.3;"></div>

    <!-- Bottom: Countdowns + Letter Count -->
    <div style="display: flex; justify-content: space-between; align-items: flex-end;">

      <!-- Countdowns -->
      <div style="display: flex; gap: 12px;">
        {% for event in countdowns limit:2 %}
        <div style="text-align: center;">
          <div style="font-size: 18px; font-weight: 700; line-height: 1;">{{ event.days }}</div>
          <div style="font-size: 7px; opacity: 0.6;">days till</div>
          <div style="font-size: 8px; font-weight: 600;">{{ event.name }}</div>
        </div>
        {% endfor %}
        {% if countdowns.size == 0 %}
        <div style="opacity: 0.4; font-size: 9px;">No countdowns</div>
        {% endif %}
      </div>

      <!-- Letter Count -->
      <div style="text-align: right; font-size: 8px; opacity: 0.5; line-height: 1.2;">
        <div style="font-size: 14px; font-weight: 600; opacity: 1;">{{ message_count }}</div>
        <div>letters of love</div>
      </div>

    </div>

  </div>

  <!-- Title Bar (Smaller) -->
  <div class="title_bar" style="font-size: 10px; padding: 4px 8px;">
    <img src="https://img.icons8.com/ios-glyphs/10/000000/like--v1.png" style="opacity: 0.7; margin-right: 3px;" />
    <span class="title" style="font-size: 10px;">Love from Adi</span>
  </div>

</div>
