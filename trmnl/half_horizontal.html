<div class="view view--half_horizontal">

  <div style="display: flex; flex-direction: column; justify-content: space-between; height: calc(100% - 36px); padding: 12px 24px 8px 24px;">

    <!-- Main Content Row -->
    <div style="display: flex; align-items: center; gap: 24px; flex: 1;">

      <!-- Love Message (Left Side) -->
      <div style="flex: 1; min-width: 0;">
        <div style="font-size: 9px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.5; margin-bottom: 6px;">
          A message for you
        </div>
        <div style="font-size: 22px; line-height: 1.3; font-weight: 500; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;">
          "{{ love_message }}"
        </div>
      </div>

      <!-- Divider -->
      <div style="width: 2px; height: 60px; background: black; opacity: 0.3;"></div>

      <!-- Right Side: Countdowns + QR -->
      <div style="display: flex; align-items: center; gap: 16px;">

        <!-- Countdowns -->
        <div style="display: flex; gap: 16px;">
          {% for event in countdowns limit:2 %}
          <div style="text-align: center;">
            <div style="font-size: 28px; font-weight: 700; line-height: 1;">{{ event.days }}</div>
            <div style="font-size: 9px; opacity: 0.6;">days till</div>
            <div style="font-size: 11px; font-weight: 600;">{{ event.name }}</div>
          </div>
          {% endfor %}
          {% if countdowns.size == 0 %}
          <div style="opacity: 0.4; font-size: 11px;">No countdowns</div>
          {% endif %}
        </div>

        <!-- QR + Stats -->
        <div style="display: flex; align-items: center; gap: 8px;">
          <div style="text-align: right; font-size: 9px; opacity: 0.5; line-height: 1.3;">
            <div>{{ message_count }}</div>
            <div>letters</div>
          </div>
          <div style="display: flex; flex-direction: column; align-items: center;">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=48x48&data=HTTPS://ADITYASINGHAL.COM/LOVESINGY&margin=0" 
              style="width: 40px; height: 40px; image-rendering: pixelated;" />
            <div style="font-size: 8px; opacity: 0.4; margin-top: 1px;">reply</div>
          </div>
        </div>

      </div>

    </div>

  </div>

  <!-- Title Bar -->
  <div class="title_bar">
    <img src="https://img.icons8.com/ios-glyphs/16/000000/like--v1.png" style="opacity: 0.7; margin-right: 6px;" />
    <span class="title">Love from Adi</span>
  </div>

</div>
